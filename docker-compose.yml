services:
  # ── MongoDB ────────────────────────────────────
  mongo:
    image: mongo:8
    container_name: petconnect-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: petconnect
    networks:
      - petconnect-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend (Node/Express) ─────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: petconnect-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/petconnect
      JWT_SECRET: ${JWT_SECRET:-pet_connect_docker_secret_change_me}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CLIENT_URL: http://localhost:3000
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - petconnect-net

  # ── Frontend (Vite React → Nginx) ──────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: petconnect-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - petconnect-net

volumes:
  mongo_data:
    driver: local

networks:
  petconnect-net:
    driver: bridge
